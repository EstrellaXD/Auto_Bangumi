services:
  app:
    depends_on:
      qbittorrent:
        condition: service_healthy

  qbittorrent:
    image: linuxserver/qbittorrent:5.2.3@sha256:2e074403c7b72e6d89cee3d0d41a47f7b5708c6a9e5316f3958c90765cbe12ce
    environment:
      TZ: UTC
      PUID: ${AB_E2E_PUID:-1000}
      PGID: ${AB_E2E_PGID:-1000}
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "6881"
    volumes:
      - type: bind
        source: ${AB_E2E_QB_CONFIG_DIR:?AB_E2E_QB_CONFIG_DIR must be set}
        target: /config
      - type: bind
        source: ${AB_E2E_DOWNLOAD_DIR:?AB_E2E_DOWNLOAD_DIR must be set}
        target: /downloads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 10s
    stop_grace_period: 20s
    networks:
      - e2e

  port-proxy:
    ports:
      - "127.0.0.1::28080"
