services:
  AutoBangumi:
    image: "ghcr.io/estrellaxd/auto_bangumi:latest"
    container_name: AutoBangumi
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    network_mode: bridge
    ports:
      - "7892:7892"
    # 应用内“一键更新”依赖此重启策略：更新后容器会自行退出，由 Docker 重启
    # 以应用更新，因此必须保留 restart: unless-stopped。
    restart: unless-stopped
    dns:
      - 223.5.5.5
    environment:
      - TZ=Asia/Shanghai
      - PGID=${PGID:-1000}
      - PUID=${PUID:-1000}
      - UMASK=022